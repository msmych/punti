# Prefix — Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse — click panes, scroll, drag to resize
set -g mouse on

# Vi keys in copy mode (/ to search, n/N for next/prev, v to select, y to yank)
setw -g mode-keys vi

# Start window/pane numbering at 1 (0 is far from prefix key)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Intuitive splits (open in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Longer scrollback
set -g history-limit 50000

# Faster escape (default 500ms delays vim)
set -sg escape-time 0

# Longer repeat window for resizing (default 500ms)
set -g repeat-time 1000

# Extended keys (enables Ctrl+Shift distinctions for nvim etc.)
set -s extended-keys on
set -as terminal-features ',xterm-256color:extkeys'

# Status bar at the top
set -g status-position top

# Transparent, minimal status bar
set -g status-style "bg=default,fg=#a0a0a0"
set -g status-left "#[fg=#eb6f92]▰▰▰#[fg=#f6c177]▰▰▰#[fg=#9ccfd8]▰▰▰#[fg=#c4a7e7]▰▰▰ #[fg=#a0a0a0]#S"
set -g status-left-length 50
set -g status-right ""
set -g status-justify right
set -g window-status-current-format "#[bold,fg=#ffffff]#I:#W"
set -g window-status-format "#I:#W"

# Custom copy mode
set -gw copy-mode-position-format "#[align=right][#{scroll_position}/#{history_size}]#{?search_timed_out, (timed out),#{?search_count,(#{search_count}#{?search_count_partial,+,} results),}}"

# Clipboard integration
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Subtle pane borders
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#666666"

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"
