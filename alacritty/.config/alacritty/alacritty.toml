[env]
TERM = "xterm-256color"

[font]
size = 14.0

[font.normal]
family = "Hack Nerd Font Mono"

[window]
decorations = "Transparent"
startup_mode = "Maximized"
option_as_alt = "Both"

[window.padding]
x = 4
y = 4

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[scrolling]
history = 0
